version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bank_postgres
    environment:
      POSTGRES_USER: bank_admin
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: crm_database
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bank_backend
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: bank_frontend
    ports:
      - "8599:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  db_data: